[package]
name = "nostr-identity-zkp-wasm"
version = "0.2.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
serde_json = "1.0"
sha2 = "0.10"
hex = "0.4"
base64 = "0.22"
getrandom = { version = "0.2", features = ["js"] }
rand = { version = "0.8", features = ["getrandom"] }

# ZKP dependencies
ark-bn254 = "0.4"
ark-groth16 = "0.4"
ark-crypto-primitives = "0.4"
ark-relations = "0.4"
ark-ff = "0.4"
ark-serialize = "0.4"
ark-std = "0.4"

[profile.release]
codegen-units = 1
opt-level = "z"
lto = true
